<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OPERADOR — Andar 0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
#c{display:block;width:100vw;height:100vh;cursor:crosshair}
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.93);z-index:100}
#overlay.h{display:none}
.scr{text-align:center;color:#fff;max-width:600px;padding:40px}
.scr h1{font-size:2.8rem;letter-spacing:.4em;margin-bottom:16px;font-weight:400}
.scr p{font-size:.82rem;line-height:2.1;color:#666;margin:4px 0}
.scr .sub{font-size:.67rem;color:#303030;letter-spacing:.13em;margin-top:20px;line-height:2}
.scr button{margin-top:26px;padding:11px 44px;background:transparent;border:1px solid rgba(255,255,255,.28);color:#888;font-family:inherit;font-size:.77rem;letter-spacing:.2em;cursor:pointer;transition:all .3s}
.scr button:hover{background:#fff;color:#000;border-color:#fff}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#hud.h{display:none}
#info{position:absolute;top:18px;left:18px;color:rgba(255,255,255,.3);font-size:.65rem;letter-spacing:.2em;line-height:2}
#cross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:rgba(255,255,255,.32);border-radius:50%}
#hint{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:.7rem;letter-spacing:.14em;text-align:center;white-space:nowrap}
#alert{position:absolute;top:27%;left:50%;transform:translateX(-50%);color:#e00;font-size:1.45rem;letter-spacing:.36em;font-weight:700;text-shadow:0 0 20px #f00;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#mistakes{position:absolute;top:18px;right:18px;color:rgba(200,80,80,.7);font-size:.65rem;letter-spacing:.18em}
#vig{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity .7s;background:radial-gradient(ellipse at center,transparent 40%,rgba(160,0,0,.6) 100%)}
#vig.on{opacity:1;animation:vp 1.1s infinite}
@keyframes vp{0%,100%{opacity:.65}50%{opacity:1}}
#flash{position:fixed;inset:0;background:#fff;pointer-events:none;opacity:0;z-index:200;transition:opacity .08s}
#speech{position:absolute;bottom:72px;left:50%;transform:translateX(-50%) translateY(8px);max-width:560px;min-width:220px;background:rgba(0,0,0,.85);border-left:2px solid rgba(255,255,255,.18);padding:11px 18px 11px 15px;opacity:0;pointer-events:none;transition:opacity .38s,transform .38s;z-index:12}
#speech.on{opacity:1;transform:translateX(-50%) translateY(0)}
#speech.anom{border-left-color:rgba(200,0,0,.7);background:rgba(10,0,0,.9)}
#sp-name{font-size:.58rem;letter-spacing:.22em;color:rgba(255,255,255,.28);margin-bottom:5px}
#sp-txt{font-size:.86rem;color:#fff;line-height:1.65}
#dlg{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);width:500px;background:rgba(0,0,0,.92);border:1px solid rgba(255,255,255,.14);padding:20px 24px;display:none;pointer-events:all;z-index:20}
#dlg.on{display:block}
#dlg-name{color:rgba(255,255,255,.28);font-size:.6rem;letter-spacing:.24em;margin-bottom:8px}
#dlg-txt{color:#ddd;font-size:.9rem;line-height:1.78;margin-bottom:14px}
#dlg-hint{color:rgba(255,255,255,.22);font-size:.62rem;letter-spacing:.13em}
#panel{position:absolute;right:32px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.88);border:1px solid rgba(255,255,255,.11);padding:16px;display:none;pointer-events:all;z-index:20}
#panel.on{display:block}
#panel h3{color:rgba(255,255,255,.26);font-size:.57rem;letter-spacing:.22em;margin-bottom:12px;text-align:center}
.fb{display:block;width:52px;height:52px;margin:4px auto;background:#080808;border:1px solid #242424;color:#777;font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .16s}
.fb:hover{background:#181818;border-color:#666;color:#fff}
.fb.sp{border-color:#1c2e3e;color:#4a7aaa}
.fb.sp:hover{background:#0a1822;border-color:#4a7aaa}
.fb.bad{border-color:#4a1010;color:#aa4a4a}
.fb.bad:hover{background:#1a0808;border-color:#aa4a4a}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div id="flash"></div>

<div id="overlay">
  <div class="scr" id="scr-main">
    <h1>OPERADOR</h1>
    <p style="color:#3a3a3a;letter-spacing:.06em">Turno noturno — Andar 0</p>
    <p class="sub">
      WASD + Mouse — mover / olhar &nbsp;·&nbsp; SHIFT — correr<br>
      E — interagir com passageiro &nbsp;·&nbsp; Clique — painel<br><br>
      <span style="color:#1e1e1e">Erros acumulados demitem. Observe com cuidado.</span>
    </p>
    <button id="btn-start">INICIAR TURNO</button>
  </div>
</div>

<div id="hud" class="h">
  <div id="info">DIA <span id="d">1</span>/7 &nbsp;·&nbsp; PASSAGEIRO <span id="p">1</span>/5</div>
  <div id="mistakes">ERROS: <span id="merr">0</span>/3</div>
  <div id="cross"></div>
  <div id="hint"></div>
  <div id="alert">⚠ ANOMALIA — CORRA ⚠</div>
  <div id="speech"><div id="sp-name">—</div><div id="sp-txt"></div></div>
  <div id="dlg">
    <div id="dlg-name">PASSAGEIRO</div>
    <div id="dlg-txt"></div>
    <div id="dlg-hint">[E] fechar &nbsp;·&nbsp; painel ▶</div>
  </div>
  <div id="panel">
    <h3>PAINEL</h3>
    <button class="fb bad" onclick="G.pressBtn('close')">FECHAR</button>
    <button class="fb" onclick="G.pressBtn(5)">5</button>
    <button class="fb" onclick="G.pressBtn(4)">4</button>
    <button class="fb" onclick="G.pressBtn(3)">3</button>
    <button class="fb" onclick="G.pressBtn(2)">2</button>
    <button class="fb" onclick="G.pressBtn(1)">1</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════ AUDIO ═══════════════════════════════════════════════════════════
var AC=null;
function gAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,d,tp,v,dl){
  tp=tp||'sine';v=v||.1;dl=dl||0;
  var ac=gAC(),o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=tp;o.frequency.value=f;
  var t=ac.currentTime+dl;
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.start(t);o.stop(t+d+.02);
}
function ding(){[523,659,784].forEach(function(f,i){tone(f,.3,'sine',.13,i*.15);});}
function elevSnd(dir){
  var ac=gAC(),o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
  o.connect(f);f.connect(g);g.connect(ac.destination);
  f.type='lowpass';f.frequency.value=400;o.type='sawtooth';
  o.frequency.setValueAtTime(dir==='up'?65:105,ac.currentTime);
  o.frequency.linearRampToValueAtTime(dir==='up'?105:58,ac.currentTime+2.5);
  g.gain.setValueAtTime(.055,ac.currentTime);g.gain.setValueAtTime(.055,ac.currentTime+2.1);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+2.7);
  o.start();o.stop(ac.currentTime+2.8);
}
function heartbeat(){
  var ac=gAC();
  [0,.12].forEach(function(d){
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=52;
    var t=ac.currentTime+d;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.32,t+.06);
    g.gain.exponentialRampToValueAtTime(.0001,t+.24);
    o.start(t);o.stop(t+.3);
  });
}
function stepSnd(v){
  v=v||.18;var ac=gAC(),sz=Math.floor(ac.sampleRate*.09),buf=ac.createBuffer(1,sz,ac.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(sz*.26));
  var s=ac.createBufferSource(),g=ac.createGain(),fl=ac.createBiquadFilter();
  fl.type='lowpass';fl.frequency.value=200;
  s.buffer=buf;s.connect(fl);fl.connect(g);g.connect(ac.destination);
  g.gain.value=v;s.start();
}
function creak(){
  var ac=gAC(),o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type='sawtooth';
  o.frequency.setValueAtTime(160+Math.random()*80,ac.currentTime);
  o.frequency.linearRampToValueAtTime(100+Math.random()*40,ac.currentTime+.35);
  g.gain.setValueAtTime(.07,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.45);
  o.start();o.stop(ac.currentTime+.5);
}
var _amb=null;
function startAmb(){
  if(_amb)return;var ac=gAC();
  _amb=ac.createOscillator();var g=ac.createGain();
  _amb.connect(g);g.connect(ac.destination);_amb.type='sine';_amb.frequency.value=36;
  g.gain.value=.038;_amb.start();
  var o2=ac.createOscillator(),g2=ac.createGain();
  o2.connect(g2);g2.connect(ac.destination);o2.type='sawtooth';o2.frequency.value=5800;
  g2.gain.value=.0032;o2.start();
}
function setTension(hi){if(_amb)_amb.frequency.value=hi?60:36;}

// ═══════════ RENDERER ════════════════════════════════════════════════════════
var cv=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

var scene=new THREE.Scene();
scene.background=new THREE.Color(0xf0f0f0);
scene.fog=new THREE.Fog(0xf0f0f0,14,52);

var cam=new THREE.PerspectiveCamera(76,innerWidth/innerHeight,.04,90);
cam.rotation.order='YXZ';

window.addEventListener('resize',function(){
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ═══════════ MATERIALS ═══════════════════════════════════════════════════════
var M={
  wall: new THREE.MeshLambertMaterial({color:0xededed}),
  floor:new THREE.MeshLambertMaterial({color:0xdadada}),
  ceil: new THREE.MeshLambertMaterial({color:0xf8f8f8}),
  metal:new THREE.MeshLambertMaterial({color:0x8a8a8a}),
  dark: new THREE.MeshLambertMaterial({color:0x181818}),
  lum:  new THREE.MeshLambertMaterial({color:0xffffee,emissive:0xffffcc,emissiveIntensity:.7}),
  stair:new THREE.MeshLambertMaterial({color:0xcacaca}),
  blood:new THREE.MeshLambertMaterial({color:0x4a0000}),
};

var worldGrp=new THREE.Group(),corrGrp=new THREE.Group();
scene.add(worldGrp,corrGrp);
scene.add(new THREE.AmbientLight(0xffffff,.4));

var flickerLts=[];

function mkBox(w,h,d,mat,x,y,z){
  var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);return m;
}

// ═══════════ ELEVATOR A ══════════════════════════════════════════════════════
function buildElevA(){
  while(worldGrp.children.length)worldGrp.remove(worldGrp.children[0]);
  var add=function(m){worldGrp.add(m);};
  add(mkBox(2.4,.12,3.2,M.floor,0,-.06,1.4));
  add(mkBox(2.4,.1, 3.2,M.ceil, 0,3.02,1.4));
  add(mkBox(2.4,3.1,.1, M.metal,0,1.5, 3.0));
  add(mkBox(.1, 3.1,3.2,M.metal,-1.2,1.5,1.4));
  add(mkBox(.1, 3.1,3.2,M.metal, 1.2,1.5,1.4));
  add(mkBox(2.4,.24,.1,M.dark,0,2.88,.05));
  [-1.1,1.1].forEach(function(x){add(mkBox(.14,2.88,.1,M.dark,x,1.44,.05));});
  var pl=new THREE.PointLight(0xfaf8f0,1.7,8);pl.position.set(0,2.8,1.5);worldGrp.add(pl);
  add(mkBox(.9,.04,.15,M.lum,0,2.97,1.5));
  add(mkBox(.42,.22,.04,M.dark,0,2.58,.07));
  add(mkBox(1.8,.06,.07,M.metal,0,.95,2.96));
  add(mkBox(2,.22*6,.04,new THREE.MeshLambertMaterial({color:0xbcbcbc}),0,1.5,2.95));
}

// ═══════════ CORRIDOR + PATH SYSTEM ══════════════════════════════════════════
var elevBZ=-26;
// corridorWaypoints: path from elev A exit → elev B entrance for anomaly to follow
var corridorWaypoints=[];
// corridorConstraints: z-range based X clamps that force player through correct path
var corridorConstraints=[];

function addCL(z,intensity,flicker){
  var pl=new THREE.PointLight(0xffffff,intensity,9);
  pl.position.set(0,2.75,z);corrGrp.add(pl);
  corrGrp.add(mkBox(.7,.04,.08,M.lum,0,2.97,z));
  flickerLts.push({light:pl,flicker:!!flicker,base:intensity});
}

function buildCorridor(len,walkW,anomCnt){
  while(corrGrp.children.length)corrGrp.remove(corrGrp.children[0]);
  flickerLts=[];
  corridorWaypoints=[];
  corridorConstraints=[];
  elevBZ=-len;

  var L=len, EW=2.4, WW=0.1;
  // Inner half-width of main corridor
  var IHW=EW/2-WW; // =1.1

  // Helper: add left outer wall segment
  function lwSeg(zFrom,zTo){ // zFrom > zTo (zFrom closer to elev A)
    var cz=(zFrom+zTo)/2, len2=Math.abs(zFrom-zTo);
    if(len2<0.01)return;
    corrGrp.add(mkBox(WW,3.1,len2,M.wall,-EW/2+WW/2,1.5,cz));
  }
  // Helper: add right outer wall segment
  function rwSeg(zFrom,zTo){
    var cz=(zFrom+zTo)/2, len2=Math.abs(zFrom-zTo);
    if(len2<0.01)return;
    corrGrp.add(mkBox(WW,3.1,len2,M.wall, EW/2-WW/2,1.5,cz));
  }

  // --- BASE FLOOR / CEILING (always full EW width, can be extended by side rooms) ---
  corrGrp.add(mkBox(EW,.12,L,M.floor,0,-.06,-L/2));
  corrGrp.add(mkBox(EW,.1, L,M.ceil, 0,3.02,-L/2));

  // Corridor lights (base set)
  for(var lz=-4;lz>-L;lz-=6.5)addCL(lz,.85,false);

  // We'll build outer walls in segments (gaps for side rooms)
  // Track gap ranges for left/right walls:
  var rightGaps=[];  // [{zFrom, zTo}]  where right wall is removed
  var leftGaps=[];

  // ─── OBSTACLE TIER 1: cross-wall with gap on right (anomCnt≥1) ───────────
  var z1= -L*.30;
  var wallW1=1.4; // wall from left, gap on right
  var gapCX1=IHW-wallW1/2+wallW1; // gap center X (approx 0.7)
  gapCX1=0.7;

  // ─── OBSTACLE TIER 2: cross-wall with gap on left (anomCnt≥2) ────────────
  var z2=-L*.55;
  var gapCX2=-0.7;

  // ─── OBSTACLE TIER 3: side room RIGHT (anomCnt≥3) ────────────────────────
  var srR_zS=-L*.64, srR_zB=-L*.69, srR_zE=-L*.75;
  var srR_W=2.8; // extension width to right

  // ─── OBSTACLE TIER 4: side room LEFT (anomCnt≥4) ─────────────────────────
  var srL_zS=-L*.80, srL_zB=-L*.85, srL_zE=-L*.91;
  var srL_W=2.8;

  // ─── OBSTACLE TIER 5: tight squeeze (anomCnt≥5) ──────────────────────────
  var z5=-L*.93;

  // ─── BUILD OBSTACLES & REGISTER WAYPOINTS ────────────────────────────────
  // Always: first waypoint just past elev A door
  corridorWaypoints.push(new THREE.Vector3(0,0,-2));

  if(anomCnt>=1){
    // Cross-wall from left, gap on right
    var cw1W=EW-WW*2-0.7; // gap=0.7
    corrGrp.add(mkBox(cw1W,3.1,.18,M.wall,-IHW+cw1W/2,1.5,z1));
    corrGrp.add(mkBox(.04,.5,.4,M.blood,-IHW+.06,1.5,z1-.7));
    // Waypoints: approach → squeeze right → continue
    corridorWaypoints.push(new THREE.Vector3(0,0,z1+1));
    corridorWaypoints.push(new THREE.Vector3(gapCX1,0,z1+.15));
    corridorWaypoints.push(new THREE.Vector3(gapCX1,0,z1-.15));
    corridorWaypoints.push(new THREE.Vector3(0,0,z1-1));
    // Constraint: force player through right gap at the wall
    corridorConstraints.push({zS:z1+.25,zE:z1-.25,mn:-IHW,mx:IHW});
    // narrow it: gap at 0.3 to 1.1
    corridorConstraints.push({zS:z1+.22,zE:z1-.22,mn:0.3,mx:IHW});
  }

  if(anomCnt>=2){
    // Cross-wall from right, gap on left
    var cw2W=EW-WW*2-0.7;
    corrGrp.add(mkBox(cw2W,3.1,.18,M.wall, IHW-cw2W/2,1.5,z2));
    // Stair visual at 45% in
    var szZ=-L*.45,rlen=10,steps=8;
    for(var si=0;si<steps;si++){
      var spz=szZ-si*(rlen/steps),spy=-si*(rlen/steps)*Math.sin(.13)*.5;
      corrGrp.add(mkBox(EW-WW*2,.14,rlen/steps,M.stair,0,spy,spz));
      corrGrp.add(mkBox(EW-WW*2,.16*(si+1),.11,M.stair,0,spy-.08*si,spz+rlen/steps*.5));
    }
    corrGrp.add(mkBox(EW,.1,rlen,new THREE.MeshLambertMaterial({color:0xdcdcdc}),0,2.0,szZ-rlen/2));
    addCL(szZ-4,.6,false);
    corridorWaypoints.push(new THREE.Vector3(0,0,z2+1));
    corridorWaypoints.push(new THREE.Vector3(gapCX2,0,z2+.15));
    corridorWaypoints.push(new THREE.Vector3(gapCX2,0,z2-.15));
    corridorWaypoints.push(new THREE.Vector3(0,0,z2-1));
    corridorConstraints.push({zS:z2+.22,zE:z2-.22,mn:-IHW,mx:-0.3});
  }

  if(anomCnt>=3){
    // ── Side room RIGHT ─────────────────────────────────────────────────────
    rightGaps.push({zFrom:srR_zS,zTo:srR_zE});

    // Blocking wall in main corridor at srR_zB
    corrGrp.add(mkBox(EW-WW*2,3.1,.18,M.wall,0,1.5,srR_zB));

    // Side room geometry (floor/ceil/right wall/caps)
    var srR_cz=(srR_zS+srR_zE)/2;
    var srR_len=Math.abs(srR_zS-srR_zE);
    corrGrp.add(mkBox(srR_W,.12,srR_len,M.floor, IHW+WW+srR_W/2,-.06,srR_cz));
    corrGrp.add(mkBox(srR_W,.1 ,srR_len,M.ceil,  IHW+WW+srR_W/2,3.02,srR_cz));
    corrGrp.add(mkBox(.1,3.1,srR_len,M.wall,IHW+WW+srR_W+.05,1.5,srR_cz)); // right wall
    corrGrp.add(mkBox(srR_W,3.1,.12,M.wall,IHW+WW+srR_W/2,1.5,srR_zS)); // near cap (open side faces main)
    corrGrp.add(mkBox(srR_W,3.1,.12,M.wall,IHW+WW+srR_W/2,1.5,srR_zE)); // far cap
    addCL((srR_zS+srR_zE)/2,.7,true);

    // Constraints:
    // Side room Z range: X can extend to right
    corridorConstraints.push({zS:srR_zS+.1,zE:srR_zE-.1,mn:-IHW,mx:IHW+WW+srR_W-.1});
    // At blocking wall: force player into side room
    corridorConstraints.push({zS:srR_zB+.22,zE:srR_zB-.22,mn:IHW+.1,mx:IHW+WW+srR_W-.1});

    // Waypoints through side room
    corridorWaypoints.push(new THREE.Vector3(0,0,srR_zS+.5));
    corridorWaypoints.push(new THREE.Vector3(IHW+WW+srR_W*.5,0,srR_zS-.5));
    corridorWaypoints.push(new THREE.Vector3(IHW+WW+srR_W*.5,0,srR_zE+.5));
    corridorWaypoints.push(new THREE.Vector3(0,0,srR_zE-.8));
  }

  if(anomCnt>=4){
    // ── Side room LEFT ──────────────────────────────────────────────────────
    leftGaps.push({zFrom:srL_zS,zTo:srL_zE});

    corrGrp.add(mkBox(EW-WW*2,3.1,.18,M.wall,0,1.5,srL_zB));

    var srL_cz=(srL_zS+srL_zE)/2;
    var srL_len=Math.abs(srL_zS-srL_zE);
    corrGrp.add(mkBox(srL_W,.12,srL_len,M.floor,-IHW-WW-srL_W/2,-.06,srL_cz));
    corrGrp.add(mkBox(srL_W,.1 ,srL_len,M.ceil, -IHW-WW-srL_W/2,3.02,srL_cz));
    corrGrp.add(mkBox(.1,3.1,srL_len,M.wall,-IHW-WW-srL_W-.05,1.5,srL_cz));
    corrGrp.add(mkBox(srL_W,3.1,.12,M.wall,-IHW-WW-srL_W/2,1.5,srL_zS));
    corrGrp.add(mkBox(srL_W,3.1,.12,M.wall,-IHW-WW-srL_W/2,1.5,srL_zE));
    addCL((srL_zS+srL_zE)/2,.7,true);

    corridorConstraints.push({zS:srL_zS+.1,zE:srL_zE-.1,mn:-IHW-WW-srL_W+.1,mx:IHW});
    corridorConstraints.push({zS:srL_zB+.22,zE:srL_zB-.22,mn:-IHW-WW-srL_W+.1,mx:-IHW-.1});

    corridorWaypoints.push(new THREE.Vector3(0,0,srL_zS+.5));
    corridorWaypoints.push(new THREE.Vector3(-IHW-WW-srL_W*.5,0,srL_zS-.5));
    corridorWaypoints.push(new THREE.Vector3(-IHW-WW-srL_W*.5,0,srL_zE+.5));
    corridorWaypoints.push(new THREE.Vector3(0,0,srL_zE-.8));
  }

  if(anomCnt>=5){
    // Tight double squeeze
    corrGrp.add(mkBox(EW-WW*2-.5,3.1,.18,M.wall,-IHW+(EW-WW*2-.5)/2,1.5,z5));
    corridorConstraints.push({zS:z5+.22,zE:z5-.22,mn:.6,mx:IHW});
    corridorWaypoints.push(new THREE.Vector3(.8,0,z5));
  }

  corridorWaypoints.push(new THREE.Vector3(0,0,elevBZ+3));

  // ─── OUTER WALLS (left + right, with gaps for side rooms) ────────────────
  // Right outer wall
  var rzFrom=0, ri;
  for(ri=0;ri<rightGaps.length;ri++){
    var rg=rightGaps[ri];
    rwSeg(rzFrom,rg.zFrom);
    rzFrom=rg.zTo;
  }
  rwSeg(rzFrom,-L);

  // Left outer wall
  var lzFrom=0, li;
  for(li=0;li<leftGaps.length;li++){
    var lg=leftGaps[li];
    lwSeg(lzFrom,lg.zFrom);
    lzFrom=lg.zTo;
  }
  lwSeg(lzFrom,-L);

  buildElevB(-L);
}

function buildElevB(z){
  var add=function(m){corrGrp.add(m);};
  add(mkBox(2.4,.12,3.2,M.floor,0,-.06,z-1.4));
  add(mkBox(2.4,.1, 3.2,M.ceil, 0,3.02,z-1.4));
  add(mkBox(2.4,3.1,.1, M.metal,0,1.5, z-2.9));
  add(mkBox(.1, 3.1,3.2,M.metal,-1.2,1.5,z-1.4));
  add(mkBox(.1, 3.1,3.2,M.metal, 1.2,1.5,z-1.4));
  add(mkBox(2.4,.24,.1,M.dark,0,2.88,z-.04));
  [-1.1,1.1].forEach(function(x){add(mkBox(.14,2.88,.1,M.dark,x,1.44,z-.04));});
  var pl2=new THREE.PointLight(0xfaf8f0,1.4,7);pl2.position.set(0,2.8,z-1.4);corrGrp.add(pl2);
  add(mkBox(.9,.04,.14,M.lum,0,2.97,z-1.4));
}

var ANOM={NONE:0,NECK:1,ARMS:2,HEAD:3,EYES:4,TILT:5,SPEECH:6};

// ═══════════ HUMAN BUILDER ═══════════════════════════════════════════════════
function buildHuman(sk,at,fem){
  sk=sk||0xffcba4;at=at||0;fem=!!fem;
  var tops=[0x1e3a6e,0x4a1515,0x1a3a1a,0x383060,0x2a2a2a,0x3a2d1c];
  var top=tops[Math.floor(Math.random()*tops.length)];
  var hair=Math.random()>.4?0x111111:0x3d2b1f;
  var g=new THREE.Group();
  var sMat=new THREE.MeshLambertMaterial({color:sk});
  var hMat=new THREE.MeshLambertMaterial({color:hair});
  var tMat=new THREE.MeshLambertMaterial({color:top});
  var bMat=new THREE.MeshLambertMaterial({color:0x1a1a2e});
  var shMat=new THREE.MeshLambertMaterial({color:0x111111});
  var eMat=new THREE.MeshLambertMaterial({color:(at&&at!==ANOM.SPEECH&&Math.random()>.6)?0xcc0000:0x080808});

  var nH=at===ANOM.NECK?.5:.1,hSc=at===ANOM.HEAD?1.44:1;
  var aLen=at===ANOM.ARMS?.84:.5,eSp=at===ANOM.EYES?.145:.058;
  var tW=fem?.28:.36;

  var torso=new THREE.Mesh(new THREE.BoxGeometry(tW,.6,.19),tMat);torso.position.y=1.22;g.add(torso);
  var neck=new THREE.Mesh(new THREE.CylinderGeometry(.053,.053,nH,8),sMat);neck.position.y=1.57+nH/2;g.add(neck);
  var hY=1.57+nH+.135*hSc;
  var head=new THREE.Mesh(new THREE.SphereGeometry(.135*hSc,14,14),sMat);head.position.y=hY;
  if(at===ANOM.TILT)head.rotation.z=.38;g.add(head);
  var hTop=new THREE.Mesh(new THREE.SphereGeometry(.14*hSc,14,14,0,Math.PI*2,0,Math.PI*.52),hMat);hTop.position.y=hY;g.add(hTop);
  var bangs=new THREE.Mesh(new THREE.BoxGeometry(.23*hSc,.075,.065),hMat);bangs.position.set(0,hY+.085*hSc,.13*hSc);g.add(bangs);
  var eG=new THREE.SphereGeometry(.024,8,8);
  var le=new THREE.Mesh(eG,eMat);le.position.set(-eSp,hY+.02,.115*hSc);g.add(le);
  var re=new THREE.Mesh(eG,eMat);re.position.set( eSp,hY+.02,.115*hSc);g.add(re);
  var mth=new THREE.Mesh(new THREE.BoxGeometry(.062,.02,.02),new THREE.MeshLambertMaterial({color:0x5a2020}));mth.position.set(0,hY-.058,.13*hSc);g.add(mth);
  var aGeo=new THREE.CylinderGeometry(.04,.034,aLen,8);
  var lA=new THREE.Mesh(aGeo,sMat);lA.position.set(-(tW/2+.065),1.22-aLen/2+.11,0);lA.rotation.z=.1;g.add(lA);
  var rA=new THREE.Mesh(aGeo,sMat);rA.position.set(tW/2+.065,1.22-aLen/2+.11,0);rA.rotation.z=-.1;g.add(rA);
  var hGeo=new THREE.SphereGeometry(.042,8,8);
  var lH=new THREE.Mesh(hGeo,sMat);lH.position.set(-(tW/2+.065),1.22-aLen+.06,0);g.add(lH);
  var rH=new THREE.Mesh(hGeo,sMat);rH.position.set(tW/2+.065,1.22-aLen+.06,0);g.add(rH);
  var lGeo=new THREE.CylinderGeometry(.057,.05,.62,8);
  var lL=new THREE.Mesh(lGeo,bMat);lL.position.set(-.1,.65,0);g.add(lL);
  var rL=new THREE.Mesh(lGeo,bMat);rL.position.set(.1,.65,0);g.add(rL);
  var sGeo=new THREE.BoxGeometry(.13,.075,.21);
  [-0.1,.1].forEach(function(x){var s=new THREE.Mesh(sGeo,shMat);s.position.set(x,.33,.045);g.add(s);});
  g.userData={at:at,isAnom:at>0,lL:lL,rL:rL,lA:lA,rA:rA,head:head,state:'walk',speed:.016,sp2:false,aTimer:0,wpIdx:0,chSpd:0};
  g.rotation.y=0;
  return g;
}

var NAMES=['Yamamoto','Sato','Tanaka','Suzuki','Kobayashi','Ito','Watanabe','Nakamura','Hayashi','Kimura','Saito','Inoue','Kato','Yoshida'];
var SKINS=[0xffcba4,0xf1c27d,0xc68642,0x8d5524];
var NW=[['Boa noite.','Andar {f}, por favor.'],['Com licença.','Poderia ir ao andar {f}?'],['Trabalhando até tarde?','Andar {f}, obrigado.'],['Oi.','Preciso do andar {f}.']];
var AW=[['j jaslbfobab.','... {f}...'],['O fogo queima como neve.','Leve-me para o início do fim.'],['Eu nunca estive aqui.','Mas conheço cada detalhe desse lugar.'],['Não faça barulho.','Ele ouve.'],['Tem alguém atrás de você.','Não olhe agora.'],['...','...você está lendo isto?'],['Os mortos não precisam de elevadores.','Mas eu vou pedir mesmo assim. Andar {f}.'],['Hhhh...','... {f}...']];
var ND=['"Bom dia. Andar {f}, por favor."','"Olá. Poderia me levar ao {f}º andar?"','"Com licença. O {f}º andar."'];
var AD=['"... {f}. Só isso."','"Leve-me ao {f}. O elevador sabe o caminho."','"j j... {f}... j j."','"O {f}º anda sozinho às vezes."','"Todos chegam ao {f} eventualmente."','"Você ouviu? ... {f}º andar."','"mbjkks{f}kkk."'];
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function fmt(s,d){return s.replace(/\{(\w+)\}/g,function(m,k){return d[k]!==undefined?d[k]:m;});}

function genPassengers(){
  var all=[];
  for(var d=0;d<7;d++){
    var day=[];
    for(var i=0;i<5;i++){
      var isA=Math.random()<.35;
      var at=0;
      if(isA){at=Math.random()<.3?ANOM.SPEECH:Math.floor(Math.random()*5)+1;}
      var m1=isA&&Math.random()<.3;
      var fl=m1?-1:Math.floor(Math.random()*5)+1;
      var fStr=fl===-1?'-1':String(fl);
      var name=pick(NAMES);
      var wl=isA?pick(AW):pick(NW);
      var dl=isA?pick(AD):pick(ND);
      var data={f:fStr,name:name};
      day.push({name:name,floor:fl,isAnom:isA,at:at,skin:pick(SKINS),female:Math.random()>.5,wl0:fmt(wl[0],data),wl1:fmt(wl[1]||wl[0],data),dlg:fmt(dl,data)});
    }
    all.push(day);
  }
  return all;
}

// ═══════════ GAME STATE ══════════════════════════════════════════════════════
var G={
  phase:'MENU',day:1,pi:0,
  anomCount:0,corrLen:24,corrWid:2.0,
  allPass:[],curPass:null,curChar:null,
  pos:new THREE.Vector3(0,1.7,1.4),yaw:0,pitch:0,
  locked:false,keys:{},stepT:0,hbT:0,canTalk:false,caught:false,
  satisfied:0,      // per day
  totalMistakes:0,  // lifetime — 3 = fired

  pressBtn:function(v){
    var p=this.curPass;if(!p)return;
    hidePanels();
    if(v==='close'){
      if(p.isAnom){this.anomDoorClose();}
      else{
        // Closed on normal passenger = mistake
        this.recordMistake('Passageiro insatisfeito — porta fechada.');
      }
      return;
    }
    // Floor number pressed
    if(p.isAnom){
      this.startRun();
    } else {
      if(v===p.floor){
        this.satisfied++;
        this.rideFloor(v);
      } else {
        // Wrong floor
        this.recordMistake('Andar errado. Passageiro insatisfeito.');
        if(this.phase!=='FIRED')this.rideFloor(v);
      }
    }
  },

  recordMistake:function(msg){
    this.totalMistakes++;
    updateMistakes();
    setHint(msg);
    if(this.totalMistakes>=3){
      this.fired();return;
    }
    // Ride or skip passenger after mistake
    if(this.curChar){scene.remove(this.curChar);this.curChar=null;}
    var self=this;
    setTimeout(function(){setHint('');self.nextPass();},2000);
  },

  fired:function(){
    this.phase='FIRED';
    hideSpeech();
    if(this.curChar){scene.remove(this.curChar);this.curChar=null;}
    document.exitPointerLock();
    var ov=document.getElementById('overlay');
    ov.innerHTML='<div class="scr"><h1 style="color:#c00;font-size:2rem">DEMITIDO</h1><p style="color:#666;margin-top:12px">Você acumulou 3 reclamações de passageiros.</p><p style="color:#444;margin-top:4px">Não retorne ao trabalho.</p><button onclick="location.reload()">REINICIAR</button></div>';
    ov.classList.remove('h');
  },

  rideFloor:function(fl){
    setHint('Indo ao '+fl+'º andar...');
    hideSpeech();this.phase='RIDE';
    elevSnd(fl>3?'up':'down');
    if(this.curChar){scene.remove(this.curChar);this.curChar=null;}
    var self=this;
    setTimeout(function(){ding();setHint('');self.nextPass();},3400);
  },

  startRun:function(){
    this.anomCount++;this.phase='RUN';
    setTension(true);hideSpeech();
    document.getElementById('vig').classList.add('on');
    document.getElementById('alert').style.opacity='1';
    if(this.curChar){
      this.curChar.userData.state='alerted';
      this.curChar.userData.aTimer=3.0;
      this.curChar.userData.chSpd=.04+this.anomCount*.006;
      this.curChar.userData.wpIdx=0;
      this.curChar.position.set(0,0,-.3);
    }
    this.corrLen=Math.min(48,this.corrLen+7);
    this.corrWid=Math.max(0.6,this.corrWid-.2);
    var self=this;
    setTimeout(function(){buildCorridor(self.corrLen,self.corrWid,self.anomCount);},80);
    // Countdown
    [0,1,2].forEach(function(i){
      setTimeout(function(){
        if(self.phase==='RUN')setHint('CORRA EM '+(3-i)+'...');
      },i*1000);
    });
    setTimeout(function(){
      if(self.phase==='RUN')setHint('CORRA!  SHIFT + WASD até o outro elevador!');
    },3000);
  },

  anomDoorClose:function(){
    this.anomCount++;hideSpeech();ding();
    setHint('Porta fechada. Anomalia bloqueada.');setTension(false);
    if(this.curChar){scene.remove(this.curChar);this.curChar=null;}
    this.corrLen=Math.min(48,this.corrLen+5);
    this.corrWid=Math.max(0.6,this.corrWid-.18);
    buildCorridor(this.corrLen,this.corrWid,this.anomCount);
    var self=this;
    setTimeout(function(){setHint('');self.nextPass();},2600);
  },

  reachedElevB:function(){
    this.phase='ESCAPE';setTension(false);
    document.getElementById('vig').classList.remove('on');
    document.getElementById('alert').style.opacity='0';
    if(this.curChar){scene.remove(this.curChar);this.curChar=null;}
    ding();setHint('Escapou. Retornando...');
    var self=this;
    setTimeout(function(){
      flash();
      setTimeout(function(){
        self.pos.set(0,1.7,1.4);self.yaw=Math.PI;self.pitch=0;
        setHint('');self.nextPass();
      },500);
    },2200);
  },

  nextPass:function(){
    this.pi++;
    if(this.pi>=5){this.endDay();return;}
    this.phase='WAIT';updateHUD();
    var self=this;
    setTimeout(function(){spawnPass();},1500);
  },

  endDay:function(){
    if(this.curChar){scene.remove(this.curChar);this.curChar=null;}
    var sat=this.satisfied;
    this.satisfied=0;
    if(this.day>=7){showEnding();return;}
    var dayNum=this.day;
    this.day++;this.pi=0;updateHUD();
    showDaySummary(dayNum,sat,function(){
      G.phase='WAIT';
      setTimeout(spawnPass,1500);
    });
  },

  die:function(){
    if(this.caught)return;
    this.caught=true;this.phase='DEAD';
    setTension(false);document.exitPointerLock();hideSpeech();
    var ov=document.getElementById('overlay');
    ov.innerHTML='<div class="scr"><h1>CAPTURADO</h1><p style="color:#555">Dia '+this.day+' — Passageiro '+(this.pi+1)+'</p><button onclick="location.reload()">TENTAR NOVAMENTE</button></div>';
    ov.classList.remove('h');
  }
};

function spawnPass(){
  if(G.pi>=5){G.endDay();return;}
  var p=G.allPass[G.day-1][G.pi];
  G.curPass=p;
  if(G.curChar){scene.remove(G.curChar);G.curChar=null;}
  var physAt=p.at===ANOM.SPEECH?ANOM.NONE:p.at;
  var ch=buildHuman(p.skin,physAt,p.female);
  // Speed: arrive in ~5s
  var dist=Math.abs((-0.2)-(elevBZ+2.4));
  ch.userData.speed=dist/(5/0.016);
  ch.position.set(0,0,elevBZ+2.4);
  ch.rotation.y=0;
  scene.add(ch);
  G.curChar=ch;
  G.phase='WALKING';G.canTalk=false;
  setHint('');updateHUD();
  var cch=ch;
  setTimeout(function(){
    if(G.curChar===cch&&G.phase==='WALKING')showSpeech(p.name,p.wl0,p.isAnom,4200);
  },900);
}

// ═══════════ MAIN LOOP ════════════════════════════════════════════════════════
var clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta(),.05);
  var t=clock.getElapsedTime();
  tickPlayer(dt,t);
  tickChar(dt,t);
  tickLights(t);
  cam.position.copy(G.pos);
  cam.rotation.y=G.yaw;
  cam.rotation.x=G.pitch;
  renderer.render(scene,cam);

// ── PLAYER TICK ────────────────────────────────────────────────────────────
function tickPlayer(dt,t){
  if(!G.locked)return;
  var FROZEN=['MENU','DIALOG','RIDE','DEAD','END','WAITING','WAIT','WALKING','FIRED'];
  var canMove=FROZEN.indexOf(G.phase)===-1;

  if(canMove){
    var run=G.keys['ShiftLeft']||G.keys['ShiftRight'];
    var sp=run?.105:.046;
    var fw=new THREE.Vector3(-Math.sin(G.yaw),0,-Math.cos(G.yaw));
    var rt=new THREE.Vector3(Math.cos(G.yaw),0,-Math.sin(G.yaw));
    var moved=false;
    if(G.keys['KeyW']||G.keys['ArrowUp'])   {G.pos.addScaledVector(fw,sp);moved=true;}
    if(G.keys['KeyS']||G.keys['ArrowDown']) {G.pos.addScaledVector(fw,-sp*.85);moved=true;}
    if(G.keys['KeyA']||G.keys['ArrowLeft']) {G.pos.addScaledVector(rt,-sp*.8);moved=true;}
    if(G.keys['KeyD']||G.keys['ArrowRight']){G.pos.addScaledVector(rt,sp*.8);moved=true;}
    if(moved){
      G.stepT-=dt;
      if(G.stepT<=0){stepSnd(run?.25:.17);G.stepT=run?.22:.42;}
      G.pos.y=1.7+Math.sin(t*8.5*(run?1.8:1))*.022;
    }else G.pos.y=1.7;

    // Dynamic X clamping based on corridor constraints
    var mn=-1.05,mx=1.05;
    for(var ci=0;ci<corridorConstraints.length;ci++){
      var cc=corridorConstraints[ci];
      if(G.pos.z<=cc.zS&&G.pos.z>=cc.zE){mn=cc.mn;mx=cc.mx;}
    }
    G.pos.x=Math.max(mn,Math.min(mx,G.pos.x));
    G.pos.z=Math.max(elevBZ-.2,Math.min(2.2,G.pos.z));

    if(G.phase==='RUN'&&G.pos.z<=elevBZ+1.5)G.reachedElevB();
  } else {
    G.pos.set(0,1.7,1.4);
  }
  if(G.phase==='RUN'&&G.curChar){
    var d=G.pos.distanceTo(G.curChar.position);
    G.hbT-=dt;
    if(G.hbT<=0){heartbeat();G.hbT=Math.max(.22,Math.min(.95,d*.09));}
  }
}

// ── CHARACTER TICK ─────────────────────────────────────────────────────────
function tickChar(dt,t){
  var ch=G.curChar;if(!ch)return;
  var ud=ch.userData,wt=t*5;

  // WALK toward elevator A
  if(ud.state==='walk'){
    var TARGET=-0.2;
    if(ch.position.z<TARGET){
      ch.position.z+=ud.speed;
      var wv=Math.sin(wt)*.34;
      ud.lL.rotation.x=wv;ud.rL.rotation.x=-wv;
      ud.lA.rotation.x=-wv*.5;ud.rA.rotation.x=wv*.5;
      var p=G.curPass;
      if(p&&!ud.sp2){
        var tot=Math.abs((elevBZ+2.4)-TARGET),wal=Math.abs(ch.position.z-(elevBZ+2.4));
        if(wal/tot>.58){
          ud.sp2=true;
          showSpeech(p.name,p.wl1,p.isAnom,4500);
          if(p.isAnom)setTimeout(creak,700);
        }
      }
    } else {
      ch.position.z=TARGET;ud.state='idle';G.phase='WAITING';G.canTalk=true;
      setHint('[E] Falar com o passageiro');
      var cch=ch,cp=G.curPass;
      setTimeout(function(){
        if(G.curChar===cch&&G.phase==='WAITING'&&cp)showSpeech(cp.name,'...',cp.isAnom,2800);
      },700);
      if(ud.isAnom)setTimeout(creak,1600);
    }
  }

  // IDLE sway
  if(ud.state==='idle'){
    ch.position.x=Math.sin(t*.65)*.016;
    if(ud.at===ANOM.TILT)ud.head.rotation.z=.38+Math.sin(t*1.9)*.055;
  }

  // ALERTED — twitch 3s then chase
  if(ud.state==='alerted'){
    ud.aTimer-=dt;
    var tw=Math.sin(t*22)*(.18+Math.random()*.04);
    ud.lA.rotation.x=tw*1.1;ud.rA.rotation.x=-tw*.9;
    ud.lL.rotation.x=tw*.3;ud.rL.rotation.x=-tw*.3;
    ud.head.rotation.z=Math.sin(t*18)*.08;
    ud.head.rotation.x=Math.sin(t*14)*.06;
    var dx=G.pos.x-ch.position.x,dz=G.pos.z-ch.position.z;
    ch.rotation.y=Math.atan2(dx,dz)+Math.PI;
    if(ud.aTimer<=0){
      ud.state='chase';ud.speed=ud.chSpd||.04;
      // Find first waypoint ahead of anomaly
      ud.wpIdx=0;
      for(var wi=0;wi<corridorWaypoints.length;wi++){
        if(corridorWaypoints[wi].z<ch.position.z){ud.wpIdx=wi;break;}
      }
      tone(220,.12,'sawtooth',.18);tone(110,.3,'sawtooth',.12,.08);
    }
  }

  // CHASE — follow waypoints, then player
  if(ud.state==='chase'){
    if(G.pos.distanceTo(ch.position)<1.1){G.die();return;}

    // Advance waypoints
    while(ud.wpIdx<corridorWaypoints.length&&
          ch.position.distanceTo(corridorWaypoints[ud.wpIdx])<1.2){
      ud.wpIdx++;
    }
    var tgt=ud.wpIdx<corridorWaypoints.length?corridorWaypoints[ud.wpIdx]:G.pos;
    var dir=new THREE.Vector3(tgt.x-ch.position.x,0,tgt.z-ch.position.z);
    var dLen=dir.length();
    if(dLen>0.02){
      dir.normalize();
      ch.position.addScaledVector(dir,ud.speed);
      ch.rotation.y=Math.atan2(dir.x,dir.z)+Math.PI;
    }
    var cv2=Math.sin(t*10)*.5;
    ud.lL.rotation.x=cv2;ud.rL.rotation.x=-cv2;
    ud.lA.rotation.x=-cv2*.65;ud.rA.rotation.x=cv2*.65;
    if(ud.at===ANOM.TILT)ud.head.rotation.z=.38+Math.sin(t*15)*.16;
    if(ud.at===ANOM.NECK)ud.head.rotation.x=Math.sin(t*13)*.14;
  }
}

// ── LIGHTS TICK ────────────────────────────────────────────────────────────
function tickLights(t){
  flickerLts.forEach(function(l){
    if(l.flicker){
      l.light.intensity=G.phase==='RUN'
        ?l.base*(Math.random()<.08?0:.3+Math.random()*.9)
        :l.base*(.88+Math.sin(t*240)*.07);
    } else if(G.phase==='RUN'){
      l.light.intensity=Math.max(.06,l.base*(1-Math.random()*.2));
    } else {
      l.light.intensity=l.base;
    }
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildElevA();
buildCorridor(24,2.0,0);
G.pos.set(0,1.7,1.4);G.yaw=Math.PI;
animate();
</script>
